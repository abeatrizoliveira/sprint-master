<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Cadastro</title>
</head>
<body>
    <main class="cadastro">
         <!-- lado do formulario -->
        <div class="form-side">
            <div class="logo-space">
                <img src="../assets/img/Scrum-Logo.png" width=125px height=125px alt="Logo do Sprint Master">
            </div>
            <div class="form-container">
                <h1>Seja bem vindo!</h1>
                <h5>Transforme conceitos em <b>resultados reais.</b></h5>
                <div class="icon-input cd">
                    <i class="fa-regular fa-user"></i>
                    <input class="form-input" placeholder="Nome" id="name">
                </div>
                <div class="icon-input cd">
                    <i class="fa-regular fa-envelope"></i>
                    <input class="form-input" placeholder="Email" id="email">
                </div>
                <div class="icon-input cd">
                    <i class="fa-regular fa-address-card"></i>
                    <input class="form-input" placeholder="CPF" id="cpf">
                </div>
                <div class="icon-input cd">
                    <i class="fa-solid fa-key"></i>
                    <input type="password" class="form-input" placeholder="Senha" id="password">
                </div>
                <button type="submit" class="button-next">Próximo</button>
                <div class="form-extras cd">
                    <p class="style-paragrafo cd">Já possui login? <a href="../pages/login.html"> Faça login aqui.</a></p>
                </div>
            </div>
            <div class="copy">
            <span class="copy">&copy; Sprint Master 2026</span></div>
        </div>
        <!-- lado azul  -->
         <div class="banner-pai">
            <div class="welcome-bannercd">
                <img src="../assets/img/Scrum-Logo.png" width=175px height=175px alt="Logo do Sprint Master">
                <h1>Conhecimento Ágil <br> começa aqui</h1>
                <h4>Faça login na plataforma e garanta agilidade<br> em seus processos.</h4>
            </div>
        </div>
    </main>
</body>
</html>
